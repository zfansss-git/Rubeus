name: Build Rubeus.exe

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2019   # 改这里！关键一步，绕过 2025 镜像问题

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2   # 显式加 MSBuild（Framework 项目更稳）

      - name: Build Release
        run: msbuild Rubeus/Rubeus.csproj /p:Configuration=Release /p:TargetFrameworkVersion=v4.0 /t:Build /p:OutputPath=bin\Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rubeus.exe
          path: Rubeus/bin/Release/Rubeus.exe   # 调整路径如果不对
